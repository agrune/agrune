name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate versions
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          for pkg in . packages/core packages/runtime packages/browser packages/mcp; do
            PKG_VERSION=$(node -p "require('./$pkg/package.json').version")
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "::error::$pkg version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
              exit 1
            fi
          done
          echo "All versions match: $TAG_VERSION"

      - name: Build packages
        run: pnpm build

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish @agrune/core
        run: pnpm --filter @agrune/core publish --access public --no-git-checks
        continue-on-error: true

      - name: Publish @agrune/runtime
        run: pnpm --filter @agrune/runtime publish --access public --no-git-checks
        continue-on-error: true
